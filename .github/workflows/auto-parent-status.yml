# ============================================================
# GitHub Actions Workflow — Auto Parent Status Manager
# File location: .github/workflows/auto-parent-status.yml
#
# What this does:
# 1. When a sub-task is CLOSED:
#    → Check if ALL sibling sub-tasks are closed
#    → If YES → close the parent issue + move parent card to Done
#    → If NO  → do nothing (parent stays in This Week)
#
# 2. When a sub-task is REOPENED (sent back to In Progress):
#    → Reopen the parent issue if it was closed
#    → Move parent card back to This Week
#
# Trigger: issue closed or reopened
# ============================================================

name: Auto Parent Status Manager

on:
  issues:
    types: [closed, reopened]

jobs:
  manage_parent_status:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Manage parent issue status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const action = context.payload.action; // 'closed' or 'reopened'
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`Issue #${issueNumber} was ${action}`);

            // ── Sub-task to parent mapping ──────────────────────────
            const parentMap = {
              // P1.1 sub-tasks → parent #1
              21: 1, 22: 1, 23: 1,
              // P1.2 sub-tasks → parent #2
              24: 2, 25: 2,
              // P1.3 sub-tasks → parent #3
              26: 3, 27: 3, 28: 3, 29: 3,
              // P1.4 sub-tasks → parent #4
              30: 4, 31: 4, 32: 4,
              // P1.5 sub-tasks → parent #5
              33: 5, 34: 5, 35: 5, 36: 5,
              // P1.6 sub-tasks → parent #6
              37: 6,
              // P1.7 sub-tasks → parent #7
              38: 7, 39: 7, 40: 7, 41: 7,
              // P1.8 sub-tasks → parent #8
              62: 8, 63: 8, 64: 8,
              // P1.9 sub-tasks → parent #9
              72: 9, 73: 9, 74: 9,
              // P1.10 sub-tasks → parent #10
              75: 10,
              // P2.1 sub-tasks → parent #11
              76: 11,
              // P2.2 sub-tasks → parent #12
              77: 12,
              // P2.3 sub-tasks → parent #13
              78: 13,
              // P2.4 sub-tasks → parent #14
              79: 14,
              // P2.5 sub-tasks → parent #15
              80: 15,
              // P3.1 sub-tasks → parent #16
              42: 16, 43: 16, 44: 16, 45: 16, 46: 16,
              // P3.2 sub-tasks → parent #17
              47: 17, 48: 17, 49: 17, 50: 17, 51: 17,
              // P3.3 sub-tasks → parent #18
              52: 18, 53: 18, 54: 18, 55: 18, 56: 18,
              // P3.4 sub-tasks → parent #19
              57: 19, 58: 19, 59: 19, 60: 19, 61: 19,
              // P3.5 sub-tasks → parent #20
              65: 20, 66: 20, 67: 20, 68: 20, 69: 20, 70: 20, 71: 20
            };

            // ── Reverse map: parent → all its sub-tasks ─────────────
            const childrenMap = {};
            for (const [child, parent] of Object.entries(parentMap)) {
              if (!childrenMap[parent]) childrenMap[parent] = [];
              childrenMap[parent].push(Number(child));
            }

            // ── Check if this issue is a sub-task ───────────────────
            const parentNumber = parentMap[issueNumber];
            if (!parentNumber) {
              console.log(`Issue #${issueNumber} is not a sub-task. Skipping.`);
              return;
            }

            console.log(`Issue #${issueNumber} is a sub-task of parent #${parentNumber}`);

            // ── Get all sibling sub-tasks ────────────────────────────
            const siblings = childrenMap[parentNumber];
            console.log(`Siblings of parent #${parentNumber}: ${siblings.join(', ')}`);

            if (action === 'closed') {

              // ── Check if ALL siblings are closed ──────────────────
              let allClosed = true;
              for (const siblingNum of siblings) {
                if (siblingNum === issueNumber) continue; // skip current
                const sibling = await github.rest.issues.get({
                  owner, repo, issue_number: siblingNum
                });
                if (sibling.data.state !== 'closed') {
                  allClosed = false;
                  console.log(`Sub-task #${siblingNum} is still open. Parent stays open.`);
                  break;
                }
              }

              if (allClosed) {
                console.log(`All sub-tasks of parent #${parentNumber} are closed!`);

                // Close the parent issue
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: parentNumber,
                  state: 'closed'
                });
                console.log(`✓ Parent issue #${parentNumber} closed automatically`);

                // Add a comment to the parent issue
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: parentNumber,
                  body: `All ${siblings.length} sub-tasks completed and closed.\n\nSub-tasks done:\n${siblings.map(s => `- Closes #${s}`).join('\n')}\n\n*Auto-closed by workflow*`
                });
                console.log(`✓ Comment added to parent #${parentNumber}`);

              } else {
                console.log(`Not all sub-tasks done yet. Parent #${parentNumber} stays open.`);
              }

            } else if (action === 'reopened') {

              // ── Reopen parent if it was closed ────────────────────
              const parent = await github.rest.issues.get({
                owner, repo, issue_number: parentNumber
              });

              if (parent.data.state === 'closed') {
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: parentNumber,
                  state: 'open'
                });
                console.log(`✓ Parent issue #${parentNumber} reopened`);

                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: parentNumber,
                  body: `Sub-task #${issueNumber} was reopened and sent back to In Progress.\n\nParent task reopened automatically — back in This Week.\n\n*Auto-reopened by workflow*`
                });
                console.log(`✓ Comment added to parent #${parentNumber}`);
              } else {
                console.log(`Parent #${parentNumber} is already open. No change needed.`);
              }
            }
